
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Para Dani ❤️</title>

    <meta
        name="theme-color"
        content="#000000"
    >

    <!-- Estilos principales -->
    <link
        rel="stylesheet"
        href="style.css"
    >

    <!-- Fuente -->
    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap"
        rel="stylesheet"
    >

    <!-- Compatibilidad con módulos -->
    <script
        async
        src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"
    ></script>

    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
            }
        }
    </script>
</head>

<body>

    <!-- Universo -->
    <canvas id="universo"></canvas>

    <!-- Viñeta cinematográfica -->
    <div
        id="vignette"
        aria-hidden="true"
    ></div>

    <!-- Destello inicial -->
    <div
        id="flash"
        aria-hidden="true"
    ></div>

    <!-- Mensajes principales -->
    <div id="overlay">

        <h1 id="titulo">
            Feliz cumpleaños, Dani
        </h1>

        <p id="subtitulo">
            El universo siempre guarda un lugar para las personas especiales.
        </p>

    </div>

    <!-- Pantalla de carga -->
    <div id="loader">

        <div
            class="loader-circle"
            aria-hidden="true"
        ></div>

        <span>
            Cargando universo...
        </span>

    </div>

    <!-- JavaScript principal -->
    <script
        type="module"
        src="script.js"
    ></script>

</body>

</html>
```
